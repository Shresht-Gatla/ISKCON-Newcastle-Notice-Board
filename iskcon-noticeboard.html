<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ISKCON Newcastle – Notice Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --saffron:#FF6B00; --gold:#D4AF37; --gold-l:#F5D76E;
  --crimson:#8B0000; --deep:#1A0A00; --cream:#FFF8E7;
  --header-h:80px; --ticker-h:50px;
}
html,body { width:100%; height:100%; background:var(--deep); color:var(--cream);
  font-family:'Noto Serif',serif; overflow:hidden; }
body::before { content:''; position:fixed; inset:0; pointer-events:none;
  background: radial-gradient(ellipse at 50% 50%, rgba(212,175,55,0.06) 0%, transparent 65%),
              radial-gradient(ellipse at 20% 20%, rgba(255,107,0,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(139,0,0,0.08) 0%, transparent 50%); }

#header {
  position:fixed; top:0; left:0; right:0; height:var(--header-h);
  background:linear-gradient(180deg,#2A0E00,#1A0A00);
  border-bottom:3px solid var(--gold);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; z-index:100;
  box-shadow:0 4px 40px rgba(212,175,55,0.25);
}
#header::after { content:''; position:absolute; bottom:-6px; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--saffron) 20%,var(--gold) 50%,var(--saffron) 80%,transparent); }
.logo-area { display:flex; align-items:center; gap:14px; }
.logo-area img { height:54px; width:54px; object-fit:contain; filter:drop-shadow(0 0 8px rgba(212,175,55,0.6)); }
.org-name { font-family:'Cinzel',serif; font-size:20px; font-weight:900;
  background:linear-gradient(90deg,var(--gold-l),var(--gold),var(--saffron));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:2px; }
.org-sub { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,248,231,0.6); margin-top:2px; }
..header-centre {
  position:absolute; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; justify-content:center;
  filter:drop-shadow(0 0 10px rgba(212,175,55,0.5)) brightness(1.1);
}
#clock-area { text-align:right; }
#clock { font-family:'Cinzel',serif; font-size:30px; font-weight:700; color:var(--gold);
  text-shadow:0 0 16px rgba(212,175,55,0.6); line-height:1; }
#date { font-size:12px; letter-spacing:1px; color:rgba(255,248,231,0.65); margin-top:4px; }
#slide-dots { display:flex; gap:8px; align-items:center; }
.dot { width:9px; height:9px; border-radius:50%; background:rgba(212,175,55,0.25);
  border:1px solid rgba(212,175,55,0.4); transition:all 0.4s; }
.dot.active { background:var(--gold); box-shadow:0 0 8px var(--gold); transform:scale(1.3); }

#stage { position:fixed; top:var(--header-h); bottom:var(--ticker-h); left:0; right:0; overflow:hidden; z-index:1; }

.slide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  opacity:0; transform:scale(1.05); transition:opacity 1s ease, transform 1s ease; pointer-events:none; }
.slide.active { opacity:1; transform:scale(1); pointer-events:auto; }
.slide.out { opacity:0; transform:scale(0.95); }
.slide-img { width:100%; height:100%; object-fit:contain; padding:16px; }

.slide-card { width:85%; max-width:1000px;
  background:linear-gradient(135deg,rgba(42,14,0,0.95),rgba(26,10,0,0.97));
  border:1px solid rgba(212,175,55,0.3); border-radius:4px;
  box-shadow:0 0 60px rgba(212,175,55,0.1),inset 0 0 40px rgba(139,0,0,0.1);
  display:flex; min-height:460px; overflow:hidden; position:relative; }
.slide-card::before { content:'✦'; position:absolute; top:14px; left:14px; color:var(--gold); font-size:20px; opacity:0.5; }
.slide-card::after  { content:'✦'; position:absolute; bottom:14px; right:14px; color:var(--gold); font-size:20px; opacity:0.5; }
.card-accent { width:5px; background:linear-gradient(180deg,var(--saffron),var(--gold),var(--crimson)); }
.card-body { padding:50px 56px; flex:1; display:flex; flex-direction:column; justify-content:center; }
.card-tag { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--saffron); margin-bottom:18px; }
.card-title { font-family:'Cinzel',serif; font-size:44px; font-weight:700;
  background:linear-gradient(135deg,var(--gold-l),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1.15; margin-bottom:22px; }
.card-text { font-size:18px; line-height:1.8; color:rgba(255,248,231,0.8); max-width:520px; white-space:pre-line; }
.card-visual { width:260px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:90px;
  background:linear-gradient(135deg,rgba(139,0,0,0.15),rgba(255,107,0,0.05));
  border-left:1px solid rgba(212,175,55,0.1); }

/* Full-bleed background image slide */
.slide-fullbg {
  width:100%; height:100%;
  background-size:cover; background-position:center center; background-repeat:no-repeat;
  position:relative; display:flex; align-items:flex-end;
}
.slide-fullbg-overlay {
  width:100%;
  padding:40px 60px 48px;
  background:linear-gradient(to top, rgba(15,5,0,0.92) 0%, rgba(15,5,0,0.7) 50%, transparent 100%);
}
.slide-fullbg-overlay .card-tag  { font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--saffron); margin-bottom:12px; }
.slide-fullbg-overlay .card-title { font-family:'Cinzel',serif; font-size:52px; font-weight:900;
  background:linear-gradient(135deg,var(--gold-l),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1.1; margin-bottom:14px; text-shadow:none; }
.slide-fullbg-overlay .card-text { font-size:18px; line-height:1.7; color:rgba(255,248,231,0.88); max-width:700px; }

#progress { position:fixed; bottom:var(--ticker-h); left:0; height:3px;
  background:linear-gradient(90deg,var(--crimson),var(--saffron),var(--gold));
  box-shadow:0 0 8px var(--saffron); transition:width linear; z-index:99; }

#ticker { position:fixed; bottom:0; left:0; right:0; height:var(--ticker-h);
  background:linear-gradient(90deg,#2A0E00,#1A0A00);
  border-top:2px solid var(--gold); display:flex; align-items:center; overflow:hidden; z-index:100; }
#ticker::before { content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--saffron),transparent); }
#ticker-label { flex-shrink:0; padding:0 20px; background:linear-gradient(135deg,var(--saffron),#cc4e00);
  color:var(--cream); font-family:'Cinzel',serif; font-size:11px; font-weight:600;
  letter-spacing:2px; text-transform:uppercase; height:100%; display:flex; align-items:center; white-space:nowrap; }
#ticker-track { flex:1; overflow:hidden; }
#ticker-inner { display:flex; white-space:nowrap; }
#ticker-inner span { display:inline-flex; align-items:center; font-size:14px;
  color:rgba(255,248,231,0.85); padding:0 44px; }
#ticker-inner span::before { content:'❋'; color:var(--gold); margin-right:16px; font-size:11px; }
@keyframes tick { from{transform:translateX(0)} to{transform:translateX(-50%)} }
</style>
</head>
<body>
<header id="header">
  <div class="logo-area">
    <img src="logo.jpeg" alt="ISKCON Newcastle">
    <div><div class="org-name">ISKCON Newcastle</div>
    <div class="org-sub">International Society for Krishna Consciousness</div></div>
  </div>
  <div class="header-centre">
    <img src="lotus.png" alt="ISKCON Lotus" style="height:54px;width:auto;">
  </div>
  <div style="display:flex;align-items:center;gap:24px;">
    <div id="slide-dots"></div>
    <div id="clock-area"><div id="clock">00:00</div><div id="date"></div></div>
  </div>
</header>

<div id="stage"></div>
<div id="progress"></div>

<div id="ticker">
  <div id="ticker-label">🪷 IDT News</div>
  <div id="ticker-track"><div id="ticker-inner"></div></div>
</div>

<script>
const STORAGE_KEY = 'iskcon_nb_config';
const DEFAULT_SLIDES = [{"id": "s1", "type": "image", "label": "Festivals Mar\u2013Aug 2026", "data": "poster1.jpeg", "duration": 12}, {"id": "s2", "type": "image", "label": "Festivals Sep\u2013Dec 2026", "data": "poster2.jpeg", "duration": 12}, {"id": "s3", "type": "info", "label": "Welcome", "title": "Hare Krishna!", "tag": "\ud83d\ude4f Welcome", "body": "Welcome to ISKCON Newcastle \u2014 a spiritual home open to all. Join us for kirtans, prasadam, and satsang every Sunday.", "emoji": "", "duration": 8, "deity_img": "deity.jpeg"}, {"id": "s4", "type": "info", "label": "Find Us", "title": "304 Westgate Road", "tag": "\ud83d\udccd Find Us", "body": "Newcastle Upon Tyne, NE4 6AR\\n\\nwww.iskconnewcastle.org\\nFacebook @ISKCONUKNewcastle\\nInstagram @iskconnewcastleuk", "emoji": "\ud83d\uded5", "duration": 8}];
const DEFAULT_TICKER = ["Hare Krishna! Welcome to ISKCON Newcastle UK \u2014 a spiritual home for all.", "Sunday Programme: Kirtan, Bhagavatam class & Prasadam \u2014 All welcome!", "Gaura Purnima \u2014 Sunday 8th March 2026", "Rama Navami \u2014 Sunday 29th March 2026", "Nrsimha Caturdasi \u2014 Sunday 3rd May 2026", "60th Anniversary of ISKCON & 30th of ISKCON Newcastle \u2014 Sunday 12th July 2026", "Balarama Jayanti \u2014 Sunday 30th August 2026", "Janmastami \u2014 Friday 4th September 2026", "Srila Prabhupada's 130th Vyasa Puja \u2014 Saturday 5th September 2026", "Radhastami \u2014 Sunday 20th September 2026", "Govardhana Puja \u2014 Sunday 8th November 2026", "Gita Jayanti \u2014 Sunday 20th December 2026", "304 Westgate Road, Newcastle Upon Tyne, NE4 6AR | www.iskconnewcastle.org"];

// Clock
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const D=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const M=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date').textContent = D[n.getDay()]+' '+n.getDate()+' '+M[n.getMonth()]+' '+n.getFullYear();
}
updateClock(); setInterval(updateClock,1000);

// Load config — bump CONFIG_VERSION to force a reset after updates
const CONFIG_VERSION = '2';
function loadConfig() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    const cfg = JSON.parse(raw);
    if (cfg.version === CONFIG_VERSION) return cfg;
  }
  // Version mismatch or first run — use defaults
  const fresh = { version: CONFIG_VERSION, slides: DEFAULT_SLIDES, ticker: DEFAULT_TICKER };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
  return fresh;
}

// Build slides
const cfg = loadConfig();
const slides = cfg.slides;
const tickerItems = cfg.ticker;

const stage = document.getElementById('stage');
const dotsEl = document.getElementById('slide-dots');

slides.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i===0?' active':'');
  el.id = 'slide-'+i;
  if (s.type === 'image') {
    el.innerHTML = `<img class="slide-img" src="${s.data}" alt="${s.label}">`;
  } else {
    el.innerHTML = `${s.deity_img ? `
    <div class="slide-fullbg" style="background-image:url('${s.deity_img}')">
      <div class="slide-fullbg-overlay">
        <div class="card-tag">${s.tag||''}</div>
        <div class="card-title">${s.title||''}</div>
        <div class="card-text">${s.body||''}</div>
      </div>
    </div>` : `
    <div class="slide-card">
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-tag">${s.tag||''}</div>
        <div class="card-title">${s.title||''}</div>
        <div class="card-text">${s.body||''}</div>
      </div>
      <div class="card-visual">${s.emoji||'📋'}</div>
    </div>`}`;
  }
  stage.appendChild(el);

  const dot = document.createElement('div');
  dot.className = 'dot'+(i===0?' active':'');
  dotsEl.appendChild(dot);
});

const allSlides = document.querySelectorAll('.slide');
const dots = document.querySelectorAll('.dot');
const bar = document.getElementById('progress');
let current = 0, timer;

function startProgress(dur) {
  bar.style.transition='none'; bar.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bar.style.transition=`width ${dur}ms linear`; bar.style.width='100%';
  }));
}

function goTo(n) {
  allSlides[current].classList.remove('active');
  allSlides[current].classList.add('out');
  const prev=current;
  setTimeout(()=>allSlides[prev].classList.remove('out'),1000);
  current = n % allSlides.length;
  allSlides[current].classList.add('active');
  dots.forEach((d,i)=>d.classList.toggle('active',i===current));
  const dur = (slides[current].duration||8)*1000;
  clearTimeout(timer);
  startProgress(dur);
  timer = setTimeout(()=>goTo(current+1), dur);
}

const firstDur = (slides[0].duration||8)*1000;
startProgress(firstDur);
timer = setTimeout(()=>goTo(1), firstDur);

// Ticker
async function buildTicker() {
  let items = [...tickerItems];

  // ISKCON Desire Tree RSS feed (Atom format)
  try {
    const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://iskcondesiretree.com/profiles/blogs/feed/all');
    if (r.ok) {
      const d = await r.json();
      if (d.items && d.items.length) {
        const idt = d.items.slice(0, 10).map(i => '🪷 IDT: ' + i.title);
        items = [...items, ...idt];
      }
    }
  } catch(e) {}


  const track = document.getElementById('ticker-track');
  const inner = document.getElementById('ticker-inner');

  // Build full item list (no duplication needed — we loop via JS)
  inner.innerHTML = items.map(t=>`<span>${t}</span>`).join('');

  // Wait two frames so browser has rendered spans and we can measure widths
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  // Measure each span's width and store with its text
  const spans = [...inner.querySelectorAll('span')];
  const totalWidth = spans.reduce((sum, s) => sum + s.offsetWidth, 0);

  // Speed in px/sec — increase this number to go faster
  const PX_PER_SEC = 200;

  // Build a much longer strip (repeat items enough to fill at least 3x screen)
  const screenW = track.offsetWidth || window.innerWidth;
  const repeats = Math.ceil((screenW * 3) / totalWidth) + 2;
  const allItems = [];
  for (let i = 0; i < repeats; i++) allItems.push(...items);
  inner.innerHTML = allItems.map(t=>`<span>${t}</span>`).join('');

  // RAF-based scroll — moves inner left, resets seamlessly when first copy scrolled past
  let pos = 0;
  let last = null;

  function tick(ts) {
    if (last !== null) {
      const delta = ts - last;
      pos += (PX_PER_SEC * delta) / 1000;
      // Reset when we've scrolled one full totalWidth (= one copy of all items)
      if (pos >= totalWidth) pos -= totalWidth;
      inner.style.transform = `translateX(${-pos}px)`;
    }
    last = ts;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
buildTicker();
</script>
</body>
</html>
